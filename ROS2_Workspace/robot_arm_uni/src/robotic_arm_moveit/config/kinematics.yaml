# kinematics.yaml
# KDL solver for the arm group
# Chain: base_link → rotating_base → shoulder_link → upper_arm_link → wrist → gripper_base

arm:
  # ─────────────────────────────────────────
  # SOLVER
  # KDL is the default MoveIt solver
  # Switch to trac_ik for better performance
  # ─────────────────────────────────────────
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  # kinematics_solver: trac_ik_kinematics_plugin/TRAC_IKKinematicsPlugin  # recommended alternative

  # ─────────────────────────────────────────
  # CHAIN DEFINITION
  # ─────────────────────────────────────────
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.05          # seconds per IK attempt
  kinematics_solver_attempts: 3            # retries before failure

  # ─────────────────────────────────────────
  # POSITION & ORIENTATION TOLERANCES
  # ─────────────────────────────────────────
  goal_joint_tolerance:       0.0001       # rad
  goal_position_tolerance:    0.0001       # meters
  goal_orientation_tolerance: 0.001        # rad

# ─────────────────────────────────────────
# GRIPPER GROUP
# No IK needed — single joint, position only
# ─────────────────────────────────────────
gripper:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.05
  kinematics_solver_attempts: 3